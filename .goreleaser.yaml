version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: jig
    main: ./cmd/jig
    binary: jig
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: jig
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: jig
    repository:
      owner: jforsythe
      name: homebrew-jig
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/jforsythe/jig
    description: "Claude Code session configurator — manage profiles, MCP servers, and launch settings via a terminal UI"
    license: MIT
    install: |
      bin.install "jig"
    test: |
      system "#{bin}/jig --version"
